name: Supabase keep-alive

# Hits the Supabase REST API every 3 days to prevent the free-tier project
# from being paused after 7 days of inactivity.

on:
  schedule:
    - cron: "0 9 */3 * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase
        run: |
          if [ -z "${{ secrets.VITE_SUPABASE_URL }}" ] || [ -z "${{ secrets.VITE_SUPABASE_ANON_KEY }}" ]; then
            echo "Supabase secrets not set, skipping ping."
            exit 0
          fi
          curl -fsS \
            -H "apikey: ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.VITE_SUPABASE_ANON_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/participants?select=id&limit=1" \
            > /dev/null
          echo "Ping OK"
